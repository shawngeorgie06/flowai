databases:
  - name: flowai-db
    plan: free
    databaseName: flowai
    user: flowai

services:
  - type: web
    name: flowai
    runtime: node
    plan: free
    buildCommand: NODE_ENV=development npm run install:all && npm run build && cd server && npx prisma generate && npx prisma db push
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flowai-db
          property: connectionString
      - key: GITHUB_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DISCORD_TEST_WEBHOOK
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: NODE_ENV
        value: production
